<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRank — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:             #ffffff;
            --bg-secondary:   #f7f7f6;
            --border:         rgba(0,0,0,0.08);
            --text:           #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-tertiary:  #999;
            --danger:         #ef4444;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--bg);
            border: 0.5px solid var(--border);
            border-radius: 10px;
            width: 100%;
            max-width: 380px;
            padding: 36px;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px; height: 32px;
            background: var(--text);
            color: #fff;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .brand-tagline {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            border: 0.5px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text);
            background: var(--bg);
            transition: border-color 150ms ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--text);
        }

        input::placeholder { color: var(--text-tertiary); }

        .field-error {
            font-size: 11px;
            color: var(--danger);
            margin-top: 4px;
            display: none;
        }

        .form-error {
            font-size: 12px;
            color: var(--danger);
            background: rgba(239,68,68,0.05);
            border: 0.5px solid rgba(239,68,68,0.2);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 14px;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 9px;
            background: var(--text);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 150ms ease;
        }
        .btn-submit:hover { opacity: 0.85; }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading {
            display: none;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 5px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-link {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .footer-link a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-mark">LR</div>
            <div class="brand-name">LocalRank</div>
            <div class="brand-tagline">Amplifiez votre visibilité sur Google</div>
        </div>

        <form id="loginForm" novalidate>
            <div class="form-error" id="formError"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com" autocomplete="email">
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
                <div class="field-error" id="passwordError"></div>
            </div>

            <button type="submit" class="btn-submit">Se connecter</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Connexion en cours…
            </div>
        </form>

        <div class="footer-link">
            Pas encore de compte ? <a href="register.html">Créer un compte</a>
        </div>
    </div>

    <script>
        async function redirectToCheckout(plan, token) {
            try {
                const pricesRes = await fetch('/api/payments/prices');
                if (!pricesRes.ok) throw new Error('Impossible de récupérer les prix.');
                const prices = await pricesRes.json();
                const priceId = prices[plan];
                if (!priceId) throw new Error('Plan inconnu : ' + plan);

                const res = await fetch('/api/payments/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ priceId }),
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erreur lors du paiement.');
                window.location.href = data.checkoutUrl;
            } catch (err) {
                formError.textContent = err.message;
                formError.style.display = 'block';
                window.location.href = '/pages/dashboard.html';
            }
        }

        const form          = document.getElementById('loginForm');
        const emailInput    = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError    = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const formError     = document.getElementById('formError');
        const loading       = document.getElementById('loading');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validateForm() {
            let isValid = true;
            emailError.style.display    = 'none';
            passwordError.style.display = 'none';
            formError.style.display     = 'none';

            const email    = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email) {
                emailError.textContent = "L'email est requis";
                emailError.style.display = 'block';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Email invalide';
                emailError.style.display = 'block';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Le mot de passe est requis';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                passwordError.style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            loading.style.display = 'block';
            form.querySelector('button[type="submit"]').disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                    }),
                });
                const data = await response.json();

                if (!response.ok) {
                    formError.textContent = data.message || 'Erreur de connexion';
                    formError.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                const plan = new URLSearchParams(window.location.search).get('plan');
                if (plan) {
                    await redirectToCheckout(plan, data.token);
                } else {
                    window.location.href = '/pages/dashboard.html';
                }
            } catch (error) {
                formError.textContent = 'Erreur réseau. Veuillez réessayer.';
                formError.style.display = 'block';
                console.error('Erreur:', error);
            } finally {
                loading.style.display = 'none';
                form.querySelector('button[type="submit"]').disabled = false;
            }
        });
    </script>
</body>
</html>
