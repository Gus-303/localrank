<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRank — Inscription</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #5B5BD6;
            --accent-hover: #4747C2;
            --ink: #1A1A1A;
            --muted: #6B7280;
            --border: #E5E7EB;
            --surface: #F8F9FA;
            --white: #FFFFFF;
            --error: #DC2626;
        }

        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--ink);
        }

        .card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9375rem;
            font-family: inherit;
            color: var(--ink);
            background: var(--white);
            transition: border-color 0.15s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: 2px solid var(--accent);
            outline-offset: -1px;
            border-color: transparent;
        }

        input::placeholder { color: #C0C4CC; }

        .field-error {
            font-size: 0.8125rem;
            color: var(--error);
            margin-top: 4px;
            display: none;
        }

        .form-error {
            font-size: 0.875rem;
            color: var(--error);
            margin-bottom: 16px;
            display: none;
        }

        .password-strength {
            display: none;
            font-size: 0.8125rem;
            font-weight: 500;
            margin-top: 5px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .password-strength.weak   { display: block; color: #B91C1C; background: #FEF2F2; }
        .password-strength.medium { display: block; color: #92400E; background: #FFFBEB; }
        .password-strength.strong { display: block; color: #166534; background: #F0FDF4; }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 0.9375rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .btn-submit:hover { background: var(--accent-hover); }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

        .loading {
            display: none;
            text-align: center;
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 12px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-name">LocalRank</div>
            <div class="brand-tagline">Amplifiez votre visibilité sur Google</div>
        </div>

        <form id="registerForm" novalidate>
            <div class="form-error" id="formError"></div>

            <div class="form-group">
                <label for="businessName">Nom du commerce</label>
                <input type="text" id="businessName" name="businessName" required placeholder="Ex: Salon de Coiffure Jean" autocomplete="organization">
                <div class="field-error" id="businessNameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="votre@email.com" autocomplete="email">
                <div class="field-error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="new-password">
                <div id="passwordStrength" class="password-strength"></div>
                <div class="field-error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="••••••••" autocomplete="new-password">
                <div class="field-error" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="btn-submit">Créer mon compte</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Création du compte…
            </div>
        </form>

        <div class="footer-link">
            Déjà inscrit ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        async function redirectToCheckout(plan, token) {
            try {
                const pricesRes = await fetch('/api/payments/prices');
                if (!pricesRes.ok) throw new Error('Impossible de récupérer les prix.');
                const prices = await pricesRes.json();

                const priceId = prices[plan];
                if (!priceId) throw new Error('Plan inconnu : ' + plan);

                const res = await fetch('/api/payments/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ priceId }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erreur lors du paiement.');
                window.location.href = data.checkoutUrl;
            } catch (err) {
                formError.textContent = err.message;
                formError.style.display = 'block';
                window.location.href = '/pages/dashboard.html';
            }
        }

        const form = document.getElementById('registerForm');
        const businessNameInput = document.getElementById('businessName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const businessNameError = document.getElementById('businessNameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const formError = document.getElementById('formError');
        const passwordStrength = document.getElementById('passwordStrength');
        const loading = document.getElementById('loading');

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function getPasswordStrength(password) {
            if (password.length < 8) return 'weak';
            if (!/[A-Z]/.test(password) || !/\d/.test(password)) return 'medium';
            return 'strong';
        }

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            if (!val) { passwordStrength.className = 'password-strength'; return; }
            const strength = getPasswordStrength(val);
            passwordStrength.className = 'password-strength ' + strength;
            passwordStrength.textContent = strength === 'weak' ? 'Faible'
                : strength === 'medium' ? 'Moyen' : 'Fort';
        });

        function validateForm() {
            let isValid = true;
            [businessNameError, emailError, passwordError, confirmPasswordError, formError]
                .forEach(el => { el.style.display = 'none'; });

            const businessName = businessNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!businessName) {
                businessNameError.textContent = 'Le nom du commerce est requis';
                businessNameError.style.display = 'block';
                isValid = false;
            } else if (businessName.length < 3) {
                businessNameError.textContent = 'Le nom doit contenir au moins 3 caractères';
                businessNameError.style.display = 'block';
                isValid = false;
            }

            if (!email) {
                emailError.textContent = "L'email est requis";
                emailError.style.display = 'block';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Email invalide';
                emailError.style.display = 'block';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Le mot de passe est requis';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                passwordError.style.display = 'block';
                isValid = false;
            }

            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Veuillez confirmer le mot de passe';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Les mots de passe ne correspondent pas';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateForm()) return;

            loading.style.display = 'block';
            form.querySelector('button[type="submit"]').disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        businessName: businessNameInput.value.trim(),
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    formError.textContent = data.message || "Erreur lors de l'inscription";
                    formError.style.display = 'block';
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                const plan = new URLSearchParams(window.location.search).get('plan');
                if (plan) {
                    await redirectToCheckout(plan, data.token);
                } else {
                    window.location.href = '/pages/dashboard.html';
                }
            } catch (error) {
                formError.textContent = 'Erreur réseau. Veuillez réessayer.';
                formError.style.display = 'block';
                console.error('Erreur:', error);
            } finally {
                loading.style.display = 'none';
                form.querySelector('button[type="submit"]').disabled = false;
            }
        });
    </script>
</body>
</html>
