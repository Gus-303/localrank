<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRank - Inscription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            font-weight: 700;
        }

        .logo p {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .password-strength {
            display: none;
            margin-top: 8px;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .password-strength.weak {
            background: #fdedec;
            color: #c0392b;
            display: block;
        }

        .password-strength.medium {
            background: #fef5e7;
            color: #f39c12;
            display: block;
        }

        .password-strength.strong {
            background: #eafaf1;
            color: #27ae60;
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .footer p {
            color: #666;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>LocalRank</h1>
            <p>Amplifiez votre visibilité sur Google</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="businessName">Nom du commerce</label>
                <input 
                    type="text" 
                    id="businessName" 
                    name="businessName" 
                    required 
                    placeholder="Ex: Salon de Coiffure Jean"
                >
                <div class="error" id="businessNameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="votre@email.com"
                >
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="••••••••"
                >
                <div id="passwordStrength" class="password-strength"></div>
                <div class="error" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    required 
                    placeholder="••••••••"
                >
                <div class="error" id="confirmPasswordError"></div>
            </div>

            <div class="error" id="formError"></div>

            <button type="submit">Créer mon compte</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Création du compte...
            </div>
        </form>

        <div class="footer">
            <p>Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>

    <script>
        async function redirectToCheckout(plan, token) {
            try {
                const pricesRes = await fetch('/api/payments/prices');
                if (!pricesRes.ok) throw new Error('Impossible de récupérer les prix.');
                const prices = await pricesRes.json();

                const priceId = prices[plan];
                if (!priceId) throw new Error('Plan inconnu : ' + plan);

                const res = await fetch('/api/payments/create-checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                    },
                    body: JSON.stringify({ priceId }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Erreur lors du paiement.');

                window.location.href = data.checkoutUrl;
            } catch (err) {
                formError.textContent = err.message;
                formError.style.display = 'block';
                window.location.href = '/pages/dashboard.html';
            }
        }

        const form = document.getElementById('registerForm');
        const businessNameInput = document.getElementById('businessName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const businessNameError = document.getElementById('businessNameError');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const formError = document.getElementById('formError');
        const passwordStrength = document.getElementById('passwordStrength');
        const loading = document.getElementById('loading');

        // Validation email
        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        // Force du mot de passe
        function getPasswordStrength(password) {
            if (password.length < 8) return 'weak';
            if (!/[A-Z]/.test(password) || !/\d/.test(password)) return 'medium';
            return 'strong';
        }

        // Afficher la force du mot de passe
        passwordInput.addEventListener('input', () => {
            const strength = getPasswordStrength(passwordInput.value);
            passwordStrength.className = 'password-strength ' + strength;

            if (strength === 'weak') {
                passwordStrength.textContent = 'Faible';
            } else if (strength === 'medium') {
                passwordStrength.textContent = 'Moyen';
            } else {
                passwordStrength.textContent = 'Fort';
            }
        });

        // Validation du formulaire
        function validateForm() {
            let isValid = true;
            businessNameError.style.display = 'none';
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            confirmPasswordError.style.display = 'none';
            formError.style.display = 'none';

            const businessName = businessNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (!businessName) {
                businessNameError.textContent = 'Le nom du commerce est requis';
                businessNameError.style.display = 'block';
                isValid = false;
            } else if (businessName.length < 3) {
                businessNameError.textContent = 'Le nom doit contenir au moins 3 caractères';
                businessNameError.style.display = 'block';
                isValid = false;
            }

            if (!email) {
                emailError.textContent = 'L\'email est requis';
                emailError.style.display = 'block';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Email invalide';
                emailError.style.display = 'block';
                isValid = false;
            }

            if (!password) {
                passwordError.textContent = 'Le mot de passe est requis';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (password.length < 6) {
                passwordError.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                passwordError.style.display = 'block';
                isValid = false;
            }

            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Veuillez confirmer le mot de passe';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Les mots de passe ne correspondent pas';
                confirmPasswordError.style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        // Soumettre le formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            loading.style.display = 'block';
            form.querySelector('button').disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        businessName: businessNameInput.value.trim(),
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    formError.textContent = data.message || 'Erreur lors de l\'inscription';
                    formError.style.display = 'block';
                    return;
                }

                // Stocker le JWT dans localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Si un plan est passé en paramètre, lancer Stripe Checkout
                const plan = new URLSearchParams(window.location.search).get('plan');
                if (plan) {
                    await redirectToCheckout(plan, data.token);
                } else {
                    window.location.href = '/pages/dashboard.html';
                }
            } catch (error) {
                formError.textContent = 'Erreur réseau. Veuillez réessayer.';
                formError.style.display = 'block';
                console.error('Erreur:', error);
            } finally {
                loading.style.display = 'none';
                form.querySelector('button').disabled = false;
            }
        });
    </script>
</body>
</html>
