<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRank - Tableau de bord</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left h1 {
            font-size: 24px;
            color: #333;
            font-weight: 700;
        }

        .header-left p {
            color: #999;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
            font-size: 14px;
        }

        .user-info p {
            color: #666;
        }

        .user-info .email {
            color: #999;
            font-size: 13px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout {
            background: #f5f5f5;
            color: #333;
        }

        .btn-logout:hover {
            background: #e8e8e8;
        }

        .btn-primary {
            background: #6c63ff;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
            font-weight: 700;
        }

        .score-container {
            text-align: center;
        }

        .score-value {
            font-size: 48px;
            font-weight: 700;
            color: #6c63ff;
            margin: 20px 0;
        }

        .stars {
            font-size: 24px;
            color: #fbbf24;
            margin: 15px 0;
            letter-spacing: 5px;
        }

        .score-meta {
            color: #999;
            font-size: 14px;
            margin-top: 15px;
        }

        .reviews-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .review-item {
            padding: 15px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .review-author {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .review-rating {
            color: #fbbf24;
            font-size: 13px;
        }

        .review-text {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .review-date {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .review-response {
            padding: 10px;
            background: #e8f4f8;
            border-left: 3px solid #6c63ff;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            display: none;
        }

        .review-response.has-response {
            display: block;
        }

        .review-response-title {
            font-weight: 600;
            color: #6c63ff;
            margin-bottom: 5px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #6c63ff;
            background: white;
            color: #6c63ff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: #6c63ff;
            color: white;
        }

        .btn-small:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .posts-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .post-item {
            padding: 15px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .post-date {
            color: #999;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .post-content {
            color: #333;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #333;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .ai-response {
            padding: 15px;
            background: #f0f7ff;
            border-left: 3px solid #6c63ff;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            margin: 20px 0;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            padding: 12px;
            background: #fdedec;
            color: #c0392b;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .establishments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .establishments-header h2 {
            margin-bottom: 0;
        }

        .plan-badge {
            font-size: 13px;
            color: #666;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .establishment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #fafafa;
        }

        .establishment-info .establishment-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .establishment-info .establishment-type {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .btn-danger {
            padding: 6px 12px;
            font-size: 12px;
            background: white;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .btn-danger:hover {
            background: #e74c3c;
            color: white;
        }

        .add-establishment-form {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .add-establishment-form.visible {
            display: block;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6c63ff;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            header-right {
                flex-direction: column;
                width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .container {
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>LocalRank</h1>
            <p id="businessName" style="color: #666;"></p>
        </div>
        <div class="header-right">
            <div class="user-info">
                <p>Connecté en tant que</p>
                <p class="email" id="userEmail"></p>
            </div>
            <button class="btn-primary" id="googleAuthBtn" style="display: none;">🔗 Connecter Google</button>
            <button class="btn-logout" id="logoutBtn">Déconnexion</button>
        </div>
    </header>

    <div class="container">
        <!-- Section Score Google -->
        <div class="grid">
            <div class="section">
                <h2>📊 Score Google</h2>
                <div class="score-container">
                    <div class="score-value" id="scoreValue">-</div>
                    <div class="stars" id="scoreStars">★★★★★</div>
                    <div class="score-meta" id="scoreReviews">Nombre d'avis: -</div>
                </div>
            </div>
        </div>

        <!-- Section Derniers Avis -->
        <div class="section">
            <h2>💬 Derniers avis</h2>
            <div id="errorMessage" class="error-message"></div>
            <div id="reviewsContainer" class="reviews-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📝</div>
                    Chargement des avis...
                </div>
            </div>
        </div>

        <!-- Section Mes établissements -->
        <div class="section">
            <div class="establishments-header">
                <h2>🏪 Mes établissements</h2>
                <span class="plan-badge" id="planBadge">Plan free — 0/0</span>
            </div>
            <div id="establishmentsList"></div>
            <button class="btn-primary" id="addEstablishmentBtn" style="display: none;" onclick="toggleAddForm()">
                + Ajouter un établissement
            </button>
            <div class="add-establishment-form" id="addEstablishmentForm">
                <div class="form-group">
                    <label for="estabName">Nom de l'établissement *</label>
                    <input type="text" id="estabName" placeholder="Ex: Boulangerie Dupont" maxlength="255" />
                </div>
                <div class="form-group">
                    <label for="estabType">Type de commerce</label>
                    <select id="estabType">
                        <option value="">-- Choisir --</option>
                        <option value="Restaurant">Restaurant</option>
                        <option value="Coiffeur">Coiffeur</option>
                        <option value="Boulangerie">Boulangerie</option>
                        <option value="Garage">Garage</option>
                        <option value="Pharmacie">Pharmacie</option>
                        <option value="Hôtel">Hôtel</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button class="btn-primary" id="submitEstablishmentBtn" onclick="submitEstablishment()">Créer</button>
                    <button class="btn-secondary" onclick="toggleAddForm()">Annuler</button>
                </div>
                <div id="estabError" class="error-message" style="margin-top: 12px;"></div>
            </div>
        </div>

        <!-- Section Posts Google -->
        <div class="section">
            <h2>📱 Posts Google</h2>
            <div id="postsContainer" class="posts-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📱</div>
                    Chargement des posts...
                </div>
            </div>
        </div>
    </div>

    <!-- Modal pour générer une réponse IA -->
    <div id="aiModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Générer une réponse IA</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalReviewContent"></div>
                <div id="aiResponseContainer">
                    <div class="loading-spinner"></div>
                    <span>Génération de la réponse...</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelBtn">Fermer</button>
                <button class="btn-primary" id="copyBtn" style="display: none;">Copier la réponse</button>
            </div>
        </div>
    </div>

    <script>
        // Vérifier l'authentification
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');

            if (!token || !user) {
                window.location.href = 'login.html';
                return null;
            }

            return JSON.parse(user);
        }

        const user = checkAuth();

        if (user) {
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('businessName').textContent = user.businessName || 'Mon commerce';
        }

        // Déconnexion
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // Récupérer le token JWT
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
            };
        }

        // Vérifier si Google est connecté
        async function checkGoogleConnection() {
            try {
                const response = await fetch('/api/google/reviews', {
                    headers: getAuthHeaders(),
                });
                return response.ok;
            } catch {
                return false;
            }
        }

        // Connecter Google
        async function connectGoogle() {
            try {
                const response = await fetch('/api/google/auth', {
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    console.error('Erreur serveur:', response.status, response.statusText);
                    alert('Impossible de générer l\'URL d\'autorisation Google. Veuillez réessayer.');
                    return;
                }

                const data = await response.json();
                
                if (data.authUrl) {
                    // Rediriger vers Google OAuth
                    window.location.href = data.authUrl;
                } else {
                    alert('URL d\'autorisation invalide. Veuillez réessayer.');
                }
            } catch (error) {
                console.error('Erreur de connexion Google:', error);
                alert('Impossible de connecter Google. Veuillez vérifier votre connexion.');
            }
        }

        // Initialiser le bouton Google
        async function initGoogleButton() {
            const isConnected = await checkGoogleConnection();
            const googleBtn = document.getElementById('googleAuthBtn');
            
            if (!isConnected) {
                googleBtn.style.display = 'block';
            } else {
                googleBtn.style.display = 'none';
            }
        }

        // Ajouter l'event listener au bouton Google
        document.getElementById('googleAuthBtn').addEventListener('click', connectGoogle);

        // Charger le score Google
        async function loadGoogleScore() {
            try {
                const response = await fetch('/api/dashboard/score', {
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    throw new Error('Impossible de charger le score');
                }

                const data = await response.json();
                const score = data.score || 0;

                document.getElementById('scoreValue').textContent = score.toFixed(1);
                document.getElementById('scoreReviews').textContent = `Nombre d'avis: ${data.reviewCount || 0}`;

                // Afficher les étoiles
                const stars = Math.round(score);
                const starDisplay = '★'.repeat(stars) + '☆'.repeat(5 - stars);
                document.getElementById('scoreStars').textContent = starDisplay;
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('scoreValue').textContent = 'N/A';
            }
        }

        // Charger les avis
        async function loadReviews() {
            try {
                const response = await fetch('/api/dashboard/reviews', {
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    // Vérifier si c'est parce que Google n'est pas connecté
                    const isGoogleConnected = await checkGoogleConnection();
                    if (!isGoogleConnected) {
                        document.getElementById('reviewsContainer').innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">🔗</div>
                                <p>Connectez votre compte Google pour voir vos avis</p>
                                <button class="btn-primary" onclick="connectGoogle()" style="margin-top: 15px; padding: 10px 20px;">
                                    Connecter mon compte Google
                                </button>
                            </div>
                        `;
                        return;
                    }
                    throw new Error('Impossible de charger les avis');
                }

                const reviews = await response.json();
                const container = document.getElementById('reviewsContainer');

                if (!reviews || reviews.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div>Aucun avis pour le moment</div>';
                    return;
                }

                container.innerHTML = reviews.map(review => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-author">${escapeHtml(review.author)}</span>
                            <span class="review-rating">${'★'.repeat(review.rating)}☆${5 - review.rating}</span>
                        </div>
                        <div class="review-date">${new Date(review.publishedAt).toLocaleDateString('fr-FR')}</div>
                        <div class="review-text">${escapeHtml(review.text)}</div>
                        ${review.response ? `
                            <div class="review-response has-response">
                                <div class="review-response-title">Votre réponse :</div>
                                ${escapeHtml(review.response)}
                            </div>
                        ` : `
                            <button class="btn-small" onclick="generateReviewResponse('${encodeURI(review.text)}', '${review.id}')">
                                Générer réponse IA
                            </button>
                        `}
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('reviewsContainer').innerHTML = '<div class="empty-state">Erreur lors du chargement des avis</div>';
            }
        }

        // Charger les posts
        async function loadPosts() {
            try {
                const response = await fetch('/api/dashboard/posts', {
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    throw new Error('Impossible de charger les posts');
                }

                const posts = await response.json();
                const container = document.getElementById('postsContainer');

                if (!posts || posts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📱</div>Aucun post pour le moment</div>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="post-item">
                        <div class="post-date">${new Date(post.publishedAt).toLocaleDateString('fr-FR')}</div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <button class="btn-small" onclick="generatePostContent()">
                            Générer post IA
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('postsContainer').innerHTML = '<div class="empty-state">Erreur lors du chargement des posts</div>';
            }
        }

        // Échapper le HTML pour éviter les XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Générer une réponse IA pour un avis
        async function generateReviewResponse(reviewText, reviewId) {
            const modal = document.getElementById('aiModal');
            const modalBody = document.getElementById('modalReviewContent');
            const responseContainer = document.getElementById('aiResponseContainer');
            const copyBtn = document.getElementById('copyBtn');

            modal.classList.add('active');
            modalBody.innerHTML = `<div class="review-text"><strong>Avis :</strong> ${reviewText}</div>`;
            copyBtn.style.display = 'none';

            try {
                const response = await fetch('/api/reviews/generate-response', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        reviewId: reviewId,
                        reviewText: decodeURI(reviewText),
                    }),
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de la génération');
                }

                const data = await response.json();
                responseContainer.innerHTML = `<div class="ai-response">${escapeHtml(data.response)}</div>`;
                copyBtn.style.display = 'block';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(data.response);
                    copyBtn.textContent = '✓ Copié !';
                    setTimeout(() => {
                        copyBtn.textContent = 'Copier la réponse';
                    }, 2000);
                };
            } catch (error) {
                responseContainer.innerHTML = `<div style="color: #e74c3c; padding: 10px; background: #fdedec; border-radius: 4px;">Erreur: ${error.message}</div>`;
                console.error('Erreur:', error);
            }
        }

        // Générer contenu pour un post
        async function generatePostContent() {
            const modal = document.getElementById('aiModal');
            const modalBody = document.getElementById('modalReviewContent');
            const responseContainer = document.getElementById('aiResponseContainer');
            const copyBtn = document.getElementById('copyBtn');

            modal.classList.add('active');
            modalBody.innerHTML = '<strong>Génération d\'un nouveau post Google</strong>';
            copyBtn.style.display = 'none';

            try {
                const response = await fetch('/api/posts/generate', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de la génération');
                }

                const data = await response.json();
                responseContainer.innerHTML = `<div class="ai-response">${escapeHtml(data.content)}</div>`;
                copyBtn.style.display = 'block';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(data.content);
                    copyBtn.textContent = '✓ Copié !';
                    setTimeout(() => {
                        copyBtn.textContent = 'Copier le post';
                    }, 2000);
                };
            } catch (error) {
                responseContainer.innerHTML = `<div style="color: #e74c3c; padding: 10px; background: #fdedec; border-radius: 4px;">Erreur: ${error.message}</div>`;
                console.error('Erreur:', error);
            }
        }

        // Fermer la modal
        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('aiModal').classList.remove('active');
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('aiModal').classList.remove('active');
        });

        document.getElementById('aiModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('aiModal')) {
                document.getElementById('aiModal').classList.remove('active');
            }
        });

        // --- Établissements ---

        let establishmentData = { establishments: [], plan: 'free', limit: 0, count: 0 };

        async function loadEstablishments() {
            try {
                const response = await fetch('/api/establishments', {
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    throw new Error('Impossible de charger les établissements');
                }

                establishmentData = await response.json();
                renderEstablishments();
            } catch (error) {
                console.error('Erreur établissements:', error);
                document.getElementById('establishmentsList').innerHTML =
                    '<div class="empty-state">Erreur lors du chargement.</div>';
            }
        }

        function renderEstablishments() {
            const { establishments, plan, limit, count } = establishmentData;

            document.getElementById('planBadge').textContent =
                `Plan ${plan} — ${count}/${limit} établissement${limit > 1 ? 's' : ''}`;

            const list = document.getElementById('establishmentsList');
            if (!establishments || establishments.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 20px 0 10px;">Aucun établissement ajouté.</div>';
            } else {
                list.innerHTML = establishments.map(e => `
                    <div class="establishment-item">
                        <div class="establishment-info">
                            <div class="establishment-name">${escapeHtml(e.name)}</div>
                            ${e.type ? `<div class="establishment-type">${escapeHtml(e.type)}</div>` : ''}
                        </div>
                        <button class="btn-danger" onclick="deleteEstablishment(${e.id})">Supprimer</button>
                    </div>
                `).join('');
            }

            const addBtn = document.getElementById('addEstablishmentBtn');
            if (count < limit) {
                addBtn.style.display = 'inline-block';
            } else {
                addBtn.style.display = 'none';
            }
        }

        function toggleAddForm() {
            const form = document.getElementById('addEstablishmentForm');
            form.classList.toggle('visible');
            if (!form.classList.contains('visible')) {
                document.getElementById('estabName').value = '';
                document.getElementById('estabType').value = '';
                document.getElementById('estabError').classList.remove('show');
            }
        }

        async function submitEstablishment() {
            const name = document.getElementById('estabName').value.trim();
            const type = document.getElementById('estabType').value;
            const errorEl = document.getElementById('estabError');
            const submitBtn = document.getElementById('submitEstablishmentBtn');

            errorEl.classList.remove('show');

            if (!name) {
                errorEl.textContent = 'Le nom est requis.';
                errorEl.classList.add('show');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Création...';

            try {
                const response = await fetch('/api/establishments', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ name, type: type || undefined }),
                });

                const data = await response.json();

                if (!response.ok) {
                    errorEl.textContent = data.error || 'Erreur lors de la création.';
                    errorEl.classList.add('show');
                    return;
                }

                toggleAddForm();
                await loadEstablishments();
            } catch (error) {
                errorEl.textContent = 'Erreur réseau. Réessayez.';
                errorEl.classList.add('show');
                console.error('Erreur:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Créer';
            }
        }

        async function deleteEstablishment(id) {
            if (!confirm('Supprimer cet établissement ?')) return;

            try {
                const response = await fetch(`/api/establishments/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders(),
                });

                if (!response.ok) {
                    const data = await response.json();
                    alert(data.error || 'Erreur lors de la suppression.');
                    return;
                }

                await loadEstablishments();
            } catch (error) {
                alert('Erreur réseau. Réessayez.');
                console.error('Erreur:', error);
            }
        }

        // Charger les données au démarrage
        window.addEventListener('load', () => {
            initGoogleButton();
            loadGoogleScore();
            loadReviews();
            loadPosts();
            loadEstablishments();
        });

        // Rafraîchir les données toutes les 30 secondes
        setInterval(() => {
            loadGoogleScore();
            loadReviews();
            loadPosts();
            loadEstablishments();
        }, 30000);
    </script>
</body>
</html>
